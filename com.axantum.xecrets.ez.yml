app-id: com.axantum.xecrets.ez
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: XecretsEz
tags:
  - proprietary

finish-args:
  - --share=ipc
  - --socket=x11
  - --filesystem=home
  - --filesystem=/tmp
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --socket=pcsc
  - --device=dri

modules:
  - name: pcsc-lite
    buildsystem: meson
    config-opts:
      - -Dlibudev=false
      - -Dlibsystemd=false
      - -Dpolkit=false
    cleanup:
      - /bin
      - /etc
      - /include
      - /sbin
      - /share/doc
      - /share/man
      - /share/metainfo
      - /lib/libpcscspy.so*
      - /lib/pkgconfig
      - /lib/systemd
      - /sysusers.d
    sources:
      - type: archive
        url: https://pcsclite.apdu.fr/files/pcsc-lite-2.4.1.tar.xz
        sha256: afd3ba68c8000d2be048dc292df99a9812df9ad2efaf0a366eea22ac1faa19a7
        x-checker-data:
          type: anitya
          project-id: 2611
          url-template: https://pcsclite.apdu.fr/files/pcsc-lite-$version.tar.xz

  - name: xecrets-ez
    buildsystem: simple
    build-commands:
      - install -D -m 0755 XecretsEz /app/bin/XecretsEz-bin
      - install -D -m 0755 XecretsEz.sh /app/bin/XecretsEz
      - install -D -m 0644 LICENSE /app/share/licenses/$FLATPAK_ID/xecrets-ez/LICENSE
      - install -D -m 0644 gpl-3.0.txt /app/share/licenses/$FLATPAK_ID/xecrets-ez/gpl-3.0.txt
      - install -D -m 0644 linux-desktop/$FLATPAK_ID.desktop /app/share/applications/$FLATPAK_ID.desktop
      - install -D -m 0644 linux-desktop/$FLATPAK_ID.xml /app/share/mime/packages/$FLATPAK_ID.xml
      - install -D -m 0644 linux-desktop/$FLATPAK_ID.metainfo.xml /app/share/metainfo/$FLATPAK_ID.metainfo.xml
      - install -D -m 0644 linux-desktop/XecretsEz.png /app/share/icons/hicolor/256x256/apps/$FLATPAK_ID.png
      - install -D -m 0644 linux-desktop/xecrets-ez-16x16.png /app/share/icons/hicolor/16x16/mimetypes/$FLATPAK_ID-application-vnd.xecrets-encrypted.png
      - install -D -m 0644 linux-desktop/xecrets-ez-32x32.png /app/share/icons/hicolor/32x32/mimetypes/$FLATPAK_ID-application-vnd.xecrets-encrypted.png
      - install -D -m 0644 linux-desktop/xecrets-ez-48x48.png /app/share/icons/hicolor/48x48/mimetypes/$FLATPAK_ID-application-vnd.xecrets-encrypted.png
      - install -D -m 0644 linux-desktop/xecrets-ez-128x128.png /app/share/icons/hicolor/128x128/mimetypes/$FLATPAK_ID-application-vnd.xecrets-encrypted.png
      - install -D -m 0644 linux-desktop/xecrets-ez-256x256.png /app/share/icons/hicolor/256x256/mimetypes/$FLATPAK_ID-application-vnd.xecrets-encrypted.png
      - update-mime-database /app/share/mime
    sources:
      - type: script
        dest-filename: XecretsEz.sh
        commands:
          - export LD_LIBRARY_PATH="/app/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          - exec /app/bin/XecretsEz-bin "$@"
      - type: archive
        url: https://www.axantum.com/build/linux/XecretsEz-Linux-x64-2.3.1548.tar.gz
        sha256: 7fbc0c672695c852c280686e1f5bd6aeae3003b9a9665e1b16246d2d87432225
        strip-components: 1
        x-checker-data:
          type: html
          url: https://www.axantum.com/rss/releases
          version-pattern: 'Xecrets Ez release ([0-9]+\.[0-9]+\.[0-9]+) for macOS, Linux and Windows'
          url-template: https://www.axantum.com/build/linux/XecretsEz-Linux-x64-$version.tar.gz
        only-arches:
          - x86_64
      - type: archive
        url: https://www.axantum.com/build/linux/XecretsEz-Linux-arm64-2.3.1548.tar.gz
        sha256: eace26d4f252ad93b9d01d9c39d8cfa5a79fdc98097529cee6778df6e5ad609f
        strip-components: 1
        x-checker-data:
          type: html
          url: https://www.axantum.com/rss/releases
          version-pattern: 'Xecrets Ez release ([0-9]+\.[0-9]+\.[0-9]+) for macOS, Linux and Windows'
          url-template: https://www.axantum.com/build/linux/XecretsEz-Linux-arm64-$version.tar.gz
        only-arches:
          - aarch64
